<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Bolton</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #09090b;
    color: white;
}

nav {
    background: #111114;
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid #dc2626;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    margin: 8px;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    background: #111114;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #27272a;
}

h1 {
    color: #ef4444;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    box-sizing: border-box;
}

input {
    background: #09090b;
    color: white;
    border: 1px solid #27272a;
}

button {
    background: #dc2626;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #b91c1c;
}

#chat {
    display: none;
}

#messages {
    height: 350px;
    overflow-y: auto;
    background: #09090b;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
}

.msg {
    margin-bottom: 12px;
    padding: 10px;
    background: #18181b;
    border-radius: 8px;
}

.nick {
    color: #ef4444;
    font-weight: bold;
}
</style>

</head>

<body>

<nav>
<a href="index.html">🏠 Início</a>
<a href="noticias.html">📰 Notícias</a>
<a href="hunted.html">🎯 Hunted</a>
<a href="chat.html">💬 Chat</a>
</nav>


<div class="container">

<h1>⚔️ Chat da Bolton</h1>


<div id="login">

<input id="nick" placeholder="Seu nick no Rucoy">

<input id="codigo" placeholder="Código de acesso">

<button onclick="entrar()">Entrar</button>

</div>


<div id="chat">

<div id="messages"></div>

<input id="mensagem" placeholder="Digite sua mensagem">

<button onclick="enviar()">Enviar</button>

</div>

</div>



<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from 
"https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDLErO616vB9thxJHv0njesKERrUbWpTBU",
authDomain: "hail-bolton.firebaseapp.com",
projectId: "hail-bolton",
storageBucket: "hail-bolton.firebasestorage.app",
messagingSenderId: "1058732171341",
appId: "1:1058732171341:web:19fe31dc88160000373c04",
measurementId: "G-47E5GLQ6CM"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let usuario = "";


window.entrar = function(){

let nick = document.getElementById("nick").value;

let codigo = document.getElementById("codigo").value;


if(codigo === "HAILBOLTON2026" && nick){

usuario = nick;

document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";

carregarMensagens();

}

else{

alert("Código incorreto ou nick vazio.");

}

}



window.enviar = async function(){

let texto = document.getElementById("mensagem").value;


if(texto){

await addDoc(collection(db,"mensagens"),{

nick: usuario,

texto: texto,

data: Date.now()

});


document.getElementById("mensagem").value="";

}

}



function carregarMensagens(){


const q = query(collection(db,"mensagens"), orderBy("data"));


onSnapshot(q,(snapshot)=>{


let area = document.getElementById("messages");

area.innerHTML="";


snapshot.forEach((doc)=>{

let m = doc.data();


area.innerHTML += `

<div class="msg">

<span class="nick">${m.nick}</span><br>

${m.texto}

</div>

`;

});


area.scrollTop = area.scrollHeight;


});


}


</script>


</body>
</html>
