<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat - Bolton</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #09090b;
    color: #f4f4f5;
}

nav {
    background: #111114;
    padding: 15px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #dc2626;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

nav a {
    color: #e4e4e7;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 5px;
}

nav a:hover, nav a.active {
    background: #dc2626;
    color: white;
}

section {
    max-width: 800px;
    margin: 40px auto;
    padding: 25px;
    background: #111114;
    border-radius: 12px;
    border: 1px solid #27272a;
}

h2 {
    color: #ef4444;
    border-bottom: 1px solid #27272a;
    padding-bottom: 10px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    box-sizing: border-box;
}

input {
    background: #09090b;
    color: white;
    border: 1px solid #27272a;
}

button {
    background: #dc2626;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #b91c1c;
}

#chat {
    display: none;
}

#messages {
    height: 350px;
    overflow-y: auto;
    background: #09090b;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
}

.msg {
    background: #18181b;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.nick {
    color: #ef4444;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 40px 20px;
    background: #111114;
    border-top: 1px solid #27272a;
    color: #71717a;
    margin-top: 60px;
}
</style>

</head>

<body>

<nav>
    <a href="index.html">🏠 Início</a>
    <a href="membros.html">👥 Membros</a>
    <a href="hunted.html">🎯 Hunted</a>
    <a href="ladroes.html">🥷 Ladrões</a>
    <a href="noticias.html">📰 Notícias / YouTube</a>
    <a href="chat.html" class="active">💬 Chat</a>
    <a href="regras.html">📜 Regras</a>
    <a href="contato.html">📞 Contato</a>
</nav>


<section>

<h2>⚔️ Chat da Bolton</h2>

<p>
Área exclusiva para membros da guilda.
</p>


<div id="login">

<input id="nick" placeholder="Seu nick no Rucoy">

<input id="codigo" placeholder="Código de acesso">

<button onclick="entrar()">Entrar no Chat</button>

</div>


<div id="chat">

<div id="messages"></div>

<input id="mensagem" placeholder="Digite sua mensagem">

<button onclick="enviar()">Enviar</button>

</div>


</section>


<footer>
<p>© 2026 Bolton Guild - Todos os direitos reservados</p>
</footer>


<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from 
"https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDLErO616vB9thxJHv0njesKERrUbWpTBU",
authDomain: "hail-bolton.firebaseapp.com",
projectId: "hail-bolton",
storageBucket: "hail-bolton.firebasestorage.app",
messagingSenderId: "1058732171341",
appId: "1:1058732171341:web:19fe31dc88160000373c04",
measurementId: "G-47E5GLQ6CM"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let usuario = "";


window.entrar = function(){

let nick = document.getElementById("nick").value;

let codigo = document.getElementById("codigo").value;


if(codigo === "HAILBOLTON2026" && nick){

usuario = nick;

document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";

carregarMensagens();

}

else{

alert("Código incorreto ou nick vazio.");

}

}


window.enviar = async function(){

let texto = document.getElementById("mensagem").value;


if(texto){

await addDoc(collection(db,"mensagens"),{

nick: usuario,

texto: texto,

data: Date.now()

});


document.getElementById("mensagem").value="";

}

}



function carregarMensagens(){

const q = query(collection(db,"mensagens"), orderBy("data"));


onSnapshot(q,(snapshot)=>{


let area = document.getElementById("messages");

area.innerHTML="";


snapshot.forEach((doc)=>{

let m = doc.data();


area.innerHTML += `

<div class="msg">

<span class="nick">${m.nick}</span><br>

${m.texto}

</div>

`;

});


area.scrollTop = area.scrollHeight;


});


}


</script>

</body>
</html>
